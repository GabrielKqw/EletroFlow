server:
  id: survival-01

minecraft:
  online-mode: true

database:
  jdbc-url: jdbc:postgresql://localhost:5432/eletroflow
  username: eletroflow
  password: eletroflow

discord:
  token: change-me
  guild-id: "0"
  panel-channel-id: "0"
  support-role-id: "0"
  payment-poll-interval-seconds: 20

efi:
  base-url: https://pix-h.api.efipay.com.br
  client-id: change-me
  client-secret: change-me
  certificate-path: C:/eletroflow/certs/efi.p12
  certificate-password: ""
  pix-key: change-me
  charge-expiration-seconds: 1800
  receiver-name: change-me
  receiver-document: change-me

webhook:
  enabled: false
  bind-address: 0.0.0.0
  port: 8086
  path: /eletroflow/webhook
  public-url: https://example.com/eletroflow/webhook?token=change-me&ignorar=
  token: change-me
  auto-register: true
  skip-mtls-checking: true

sync:
  interval-ticks: 200
