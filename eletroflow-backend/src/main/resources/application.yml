server:
  port: 8080

spring:
  application:
    name: eletroflow-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/eletroflow
    username: eletroflow
    password: eletroflow
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

eletroflow:
  efi:
    base-url: https://pix-h.api.efipay.com.br
    client-id: change-me
    client-secret: change-me
    certificate-path: /opt/eletroflow/certs/efi.p12
    certificate-password: ""
    pix-key: change-me
    charge-expiration-seconds: 1800
    webhook-secret: change-me
  catalog:
    plans:
      vip-bronze:
        display-name: VIP Bronze
        amount: 19.90
        currency: BRL
        luck-perms-group: vipbronze
        discord-role-id: "0"
        duration-days: 30
      vip-gold:
        display-name: VIP Gold
        amount: 39.90
        currency: BRL
        luck-perms-group: vipgold
        discord-role-id: "0"
        duration-days: 30
