services:
  postgres:
    image: postgres:16
    container_name: eletroflow-postgres
    environment:
      POSTGRES_DB: eletroflow
      POSTGRES_USER: eletroflow
      POSTGRES_PASSWORD: eletroflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
